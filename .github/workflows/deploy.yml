name: Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend build
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Backend syntax check
        run: python -m compileall Backend

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e

            PROJECT_DIR="${{ secrets.VPS_PROJECT_DIR }}"
            PROJECT_DIR="${PROJECT_DIR:-/opt/fyp-portal}"

            cd "$PROJECT_DIR"
            git fetch --prune origin
            git checkout origin/main -- scripts/deploy.sh
            chmod +x scripts/deploy.sh

            export PROJECT_DIR="$PROJECT_DIR"
            export BRANCH=main
            COMPOSE_FILE="${{ secrets.VPS_COMPOSE_FILE }}"
            COMPOSE_FILE="${COMPOSE_FILE:-docker-compose.prod.yml}"
            export COMPOSE_FILE="$COMPOSE_FILE"
            export SKIP_DB_RESTART=true
            export HEALTHCHECK_RETRIES=24
            export HEALTHCHECK_DELAY=5

            bash scripts/deploy.sh
